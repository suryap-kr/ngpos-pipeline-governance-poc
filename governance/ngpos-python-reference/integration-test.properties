# Integration Test Configuration
enabled=true
failOnError=true
reportOnly=false

# Test environment
test.environment=integration
use.testcontainers=true
cleanup.after.tests=true

# Thresholds
max.failed.tests=0
min.pass.rate=100

# Database settings
db.migration.required=true
db.seed.data=true
db.isolation.level=per-test

# External dependencies
mock.external.services=false
wait.for.dependencies=true
dependency.timeout.seconds=60

# Reporting
generate.html.report=true
report.path=integration-reports
