# Snyk Security Scanning Configuration
enabled=false
failOnError=true
reportOnly=false

# Severity thresholds
severity.threshold=high
max.critical.vulnerabilities=0
max.high.vulnerabilities=5

# Scan settings
scan.all.projects=true
monitor.after.scan=true

# Paths
snyk.org.id=your-org-id
snyk.api.url=https://api.snyk.io
