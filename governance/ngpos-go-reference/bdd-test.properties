# BDD/Acceptance Test Configuration
enabled=true
failOnError=true
reportOnly=false

# Test execution settings
test.environment=staging
browser.headless=true
parallel.scenarios=false

# Failure thresholds
max.failed.scenarios=0
retry.failed.tests=true
max.retry.attempts=2

# Reporting
generate.cucumber.report=true
generate.serenity.report=true
report.path=bdd-reports

# Tags
include.tags=@smoke,@regression
exclude.tags=@wip,@manual
