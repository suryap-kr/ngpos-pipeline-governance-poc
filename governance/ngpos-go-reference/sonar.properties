# SonarQube Code Quality Configuration
enabled=true
failOnError=true
reportOnly=false

# Quality gate settings
quality.gate.wait=true
quality.gate.timeout=300

# Coverage thresholds
coverage.threshold=80
new.coverage.threshold=85

# Code quality thresholds
duplications.threshold=3
bugs.threshold=0
vulnerabilities.threshold=0
code.smells.threshold=10

# Sonar server settings
sonar.host.url=https://sonarqube.company.com
sonar.project.key=ngpos-go-reference

# Go-specific settings
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=test-report.json
