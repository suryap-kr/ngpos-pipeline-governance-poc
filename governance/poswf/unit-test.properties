# Unit Test Configuration
enabled=true
failOnError=true
reportOnly=false

# Coverage thresholds
min.coverage.percentage=80
min.branch.coverage=75
min.line.coverage=80

# Test execution settings
parallel.execution=true
max.parallel.threads=4
test.timeout.seconds=300

# Reporting
generate.html.report=true
generate.xml.report=true
report.path=target/test-reports
